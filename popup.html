<html>
    <head>
        <title>Annotations</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type"/>
        <script type="text/javascript" src="lib/FileSaver.min.js"></script>
        <style type="text/css">
@charset "UTF-8";

@font-face {
    font-family: "brill";
    src: url("fonts/brill-roman.ttf");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: "brill";
    src: url("fonts/brill-bold.ttf");
    font-weight: bold;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: "brill";
    src: url("fonts/brill-italic.ttf");
    font-weight: normal;
    font-style: italic;
    font-display: swap;
}

@font-face {
    font-family: "brill";
    src: url("fonts/brill-bold-italic.ttf");
    font-weight: bold;
    font-style: italic;
    font-display: swap;
}

body {
    font-family: 'brill', serif;
    color: black;
    max-width: 100vw;
    max-height: 100vh;
    margin: 2em;
    line-height: 1.2;
    font-size: 1.5em;
    letter-spacing: 0;
    position: relative;
    padding: 0;
    background: rgb(232,232,231);
    display: flex;
    align-items: center;
    flex-direction: column;
}

img {
    padding: 3px;
}

tr:hover {
    background: rgba(180,184,196,0.8);
}

#addbutton {
    display: none;
}

#savebutton, #addtext {
    cursor: pointer;
}
#savebutton:hover, #addtext:hover {
    text-decoration: underline;
}

#content img {
    height: 100px;
}

        </style>

    </head>
    <body>
        <div class="topmenu">
            <div id="savebutton">save annotations</div>
            <div id="addtext">append annotations</div>
            <div><input id="addbutton" type="file" accept=".html,text/html"></div>
        </div>
        <h2></h2>
        <div id="content">
        </div>
    </body>
    <script type="module" src="popup.mjs"></script>
</html>
